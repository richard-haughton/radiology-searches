name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - functions/**
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-firebase-functions.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Functions Dependencies
        run: npm install --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEARCHES_APP }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Functions
        run: firebase deploy --only functions --project searches-app --non-interactive
